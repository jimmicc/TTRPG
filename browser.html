<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser — TTRPG History</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --bg2: #ffffff;
    --bg3: #eeebe4;
    --bg4: #e8e4dc;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --text: #1c1b18;
    --text2: #5a5850;
    --text3: #9a9890;
    --osr:   #c04828;
    --osr-bg: #faecea;
    --main:  #0f6e56;
    --main-bg: #e0f4ed;
    --story: #5348b7;
    --story-bg: #eeedfe;
    --cross: #78674a;
    --cross-bg: #f4f0e8;
    --shadow: 0 2px 14px rgba(0,0,0,0.07);
    --radius: 10px;
    --font-display: 'Georgia', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16150f; --bg2: #1e1d16; --bg3: #242318; --bg4: #2c2a1e;
      --border: rgba(255,255,255,0.09); --border2: rgba(255,255,255,0.16);
      --text: #e8e4d8; --text2: #a8a490; --text3: #686450;
      --osr-bg: #2e1208; --main-bg: #082018; --story-bg: #14103a; --cross-bg: #201c10;
    }
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 200;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    padding: 0 16px;
    display: flex; align-items: center; gap: 4px;
    height: 48px; flex-shrink: 0;
  }
  nav .site-title { font-family: var(--font-display); font-size: 14px; color: var(--text); margin-right: 12px; white-space: nowrap; }
  nav a { text-decoration: none; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.15s; }
  nav a:hover { background: var(--bg3); color: var(--text); }
  nav a.active { background: var(--text); color: var(--bg2); }
  .nav-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  /* MAIN LAYOUT */
  .layout {
    display: flex; flex: 1; min-height: 0; overflow: hidden;
    height: calc(100vh - 48px);
  }

  /* SIDEBAR LIST */
  .sidebar-list {
    width: 280px; min-width: 200px; max-width: 360px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-list-head {
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
  }
  input[type="search"] {
    width: 100%; padding: 7px 12px; border-radius: 8px;
    border: 1px solid var(--border2); background: var(--bg);
    color: var(--text); font-size: 13px; outline: none;
    font-family: var(--font-body);
  }
  input[type="search"]:focus { border-color: var(--story); }

  .filter-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .flt {
    padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500;
    border: 1px solid var(--border2); background: var(--bg); color: var(--text2);
    cursor: pointer; transition: all 0.12s;
  }
  .flt:hover { border-color: var(--text3); }
  .flt.f-osr.on    { background: var(--osr-bg);   color: var(--osr);   border-color: var(--osr); }
  .flt.f-main.on   { background: var(--main-bg);  color: var(--main);  border-color: var(--main); }
  .flt.f-story.on  { background: var(--story-bg); color: var(--story); border-color: var(--story); }
  .flt.f-cross.on  { background: var(--cross-bg); color: var(--cross); border-color: var(--cross); }
  .flt.active-cat  { background: var(--bg4); color: var(--text); border-color: var(--border2); }

  .cat-tabs {
    display: flex; overflow-x: auto; gap: 2px;
    padding: 6px 14px 0; border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    padding: 5px 11px; border-radius: 6px 6px 0 0; font-size: 12px; font-weight: 500;
    cursor: pointer; color: var(--text3); white-space: nowrap;
    border: 1px solid transparent; border-bottom: none;
    transition: all 0.12s;
  }
  .cat-tab:hover { color: var(--text2); background: var(--bg3); }
  .cat-tab.on { color: var(--text); background: var(--bg); border-color: var(--border); }

  .page-list {
    flex: 1; overflow-y: auto;
    padding: 4px 0;
  }
  .page-item {
    padding: 8px 14px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    font-size: 13px; line-height: 1.4;
  }
  .page-item:hover { background: var(--bg3); }
  .page-item.selected { background: var(--bg4); }
  .page-item-name { flex: 1; color: var(--text); }
  .page-item-cat { font-size: 10px; color: var(--text3); }
  .dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    border: 1.5px solid;
  }
  .dot-osr    { background: var(--osr-bg);   border-color: var(--osr); }
  .dot-main   { background: var(--main-bg);  border-color: var(--main); }
  .dot-storygames { background: var(--story-bg); border-color: var(--story); }
  .dot-crossover  { background: var(--cross-bg); border-color: var(--cross); }
  .count-badge { font-size: 11px; color: var(--text3); padding: 0 6px; }

  /* DETAIL PANEL */
  .detail-panel {
    flex: 1; overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .detail-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--text3); font-size: 14px; text-align: center;
    padding: 40px;
  }
  .detail-content { padding: 32px 40px; max-width: 780px; }

  .detail-header { margin-bottom: 24px; }
  .detail-breadcrumb { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
  .detail-title { font-family: var(--font-display); font-size: 28px; font-weight: 400; color: var(--text); line-height: 1.2; margin-bottom: 10px; }
  .detail-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .badge {
    display: inline-block; padding: 3px 12px; border-radius: 12px;
    font-size: 11px; font-weight: 500; border: 1px solid;
  }
  .badge-osr    { background: var(--osr-bg);   color: var(--osr);   border-color: var(--osr); }
  .badge-main   { background: var(--main-bg);  color: var(--main);  border-color: var(--main); }
  .badge-storygames { background: var(--story-bg); color: var(--story); border-color: var(--story); }
  .badge-crossover  { background: var(--cross-bg); color: var(--cross); border-color: var(--cross); }
  .badge-cat    { background: var(--bg3); color: var(--text2); border-color: var(--border2); }

  .detail-links {
    background: var(--bg3); border-radius: 8px; padding: 14px 16px;
    margin-bottom: 24px;
  }
  .detail-links h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 8px; }
  .link-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .link-chip {
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    background: var(--bg2); border: 1px solid var(--border2);
    cursor: pointer; color: var(--text2); transition: all 0.12s;
    text-decoration: none;
  }
  .link-chip:hover { background: var(--bg4); color: var(--text); }

  /* MD content styling */
  .md-body { font-size: 14px; line-height: 1.75; color: var(--text2); }
  .md-body h1 { display: none; }
  .md-body h2 { font-family: var(--font-display); font-size: 17px; font-weight: 400; color: var(--text); margin: 28px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .md-body h3 { font-size: 14px; font-weight: 600; color: var(--text); margin: 20px 0 8px; }
  .md-body h4 { font-size: 13px; font-weight: 600; color: var(--text2); margin: 16px 0 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .md-body p { margin-bottom: 12px; }
  .md-body ul { margin: 8px 0 12px 20px; }
  .md-body li { margin-bottom: 4px; }
  .md-body strong { color: var(--text); font-weight: 600; }
  .md-body em { font-style: italic; }
  .md-body code { background: var(--bg3); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  .md-body blockquote { border-left: 3px solid var(--border2); padding: 8px 14px; margin: 12px 0; color: var(--text3); font-style: italic; }
  .md-body .md-table { border-collapse: collapse; width: 100%; margin: 14px 0; font-size: 13px; }
  .md-body .md-table td, .md-body .md-table th { border: 1px solid var(--border); padding: 7px 10px; text-align: left; }
  .md-body .md-table tr:nth-child(even) td { background: var(--bg3); }
  .md-body a.wikilink { color: var(--story); text-decoration: none; cursor: pointer; }
  .md-body a.wikilink:hover { text-decoration: underline; }

  .backlinks-section { margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border); }
  .backlinks-section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 10px; }

  /* MOBILE */
  @media (max-width: 680px) {
    .sidebar-list { width: 100%; max-width: 100%; position: fixed; top: 48px; left: 0; right: 0; bottom: 0; z-index: 150; display: none; }
    .sidebar-list.mobile-open { display: flex; }
    .detail-panel { width: 100%; }
    .layout { overflow: visible; height: auto; min-height: calc(100vh - 48px); }
    .detail-content { padding: 20px 18px; }
    .mobile-menu-btn { display: flex !important; }
  }
  .mobile-menu-btn { display: none; background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; color: var(--text2); }
</style>
</head>
<body>

<nav>
  <span class="site-title">TTRPG History</span>
  <a href="index.html">Home</a>
  <a href="browser.html" class="active">Browser</a>
  <a href="lineage.html">Lineage Map</a>
  <a href="guide.html">Study Guide</a>
  <div class="nav-right">
    <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()">☰ Browse</button>
  </div>
</nav>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar-list" id="sidebarList">
    <div class="sidebar-list-head">
      <input type="search" id="searchInput" placeholder="Search pages…" oninput="onSearch(this.value)">
      <div class="filter-row" id="lineageFilters">
        <button class="flt f-osr"   onclick="toggleLineage('osr')">OSR</button>
        <button class="flt f-main"  onclick="toggleLineage('main')">Mainstream</button>
        <button class="flt f-story" onclick="toggleLineage('story')">Story Games</button>
        <button class="flt f-cross" onclick="toggleLineage('cross')">Crossover</button>
      </div>
    </div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="page-list" id="pageList"></div>
  </div>

  <!-- DETAIL -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty" id="detailEmpty">
      <div>
        <div style="font-size:32px;margin-bottom:12px;">🗂</div>
        <div>Select a page from the list to read it.</div>
        <div style="font-size:12px;margin-top:6px;color:var(--text3)">213 pages · games, people, concepts, movements</div>
      </div>
    </div>
    <div class="detail-content" id="detailContent" style="display:none"></div>
  </div>

</div>

<script src="vault.js"></script>
<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const CATEGORIES = ['Games','People','Concepts','Movements','Publishers','Eras','Conventions','Personal'];
let state = {
  search: '',
  lineages: new Set(),       // empty = all
  category: 'All',
  currentKey: null,
  backlinks: {}              // key → Set of keys linking to it
};

// Build backlinks index
(function buildBacklinks() {
  for (const [key, page] of Object.entries(VAULT)) {
    for (const link of (page.links || [])) {
      // Normalize link to a key
      const resolved = resolveLink(link);
      if (resolved) {
        if (!state.backlinks[resolved]) state.backlinks[resolved] = new Set();
        state.backlinks[resolved].add(key);
      }
    }
  }
})();

function resolveLink(link) {
  // link may be "People/John Harper" or "Games/Blades in the Dark" or just a name
  if (VAULT[link]) return link;
  // Try with category prefix variations
  for (const key of Object.keys(VAULT)) {
    if (key.endsWith('/' + link) || key === link) return key;
    const name = key.split('/').slice(1).join('/');
    if (name === link) return key;
  }
  return null;
}

// ─── RENDER LIST ─────────────────────────────────────────────────────────────
function getFilteredPages() {
  const q = state.search.toLowerCase();
  return Object.values(VAULT).filter(p => {
    if (state.lineages.size > 0) {
      const lin = p.lineage;
      const mapped = lin === 'storygames' ? 'story' : lin === 'crossover' ? 'cross' : lin;
      if (!state.lineages.has(mapped)) return false;
    }
    if (state.category !== 'All' && p.category !== state.category) return false;
    if (q && !p.name.toLowerCase().includes(q) && !p.summary.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a, b) => a.name.localeCompare(b.name));
}

function renderList() {
  const pages = getFilteredPages();
  const listEl = document.getElementById('pageList');
  
  // Group by category if "All"
  if (state.category === 'All') {
    const grouped = {};
    for (const p of pages) {
      if (!grouped[p.category]) grouped[p.category] = [];
      grouped[p.category].push(p);
    }
    let html = '';
    for (const cat of CATEGORIES) {
      const group = grouped[cat] || [];
      if (!group.length) continue;
      html += `<div style="padding:7px 14px 3px;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border);position:sticky;top:0;">${cat} <span style="opacity:.6">${group.length}</span></div>`;
      for (const p of group) {
        html += pageItemHtml(p);
      }
    }
    listEl.innerHTML = html || '<div style="padding:20px;color:var(--text3);font-size:13px;text-align:center;">No results</div>';
  } else {
    listEl.innerHTML = pages.map(pageItemHtml).join('') || '<div style="padding:20px;color:var(--text3);font-size:13px;text-align:center;">No results</div>';
  }
  
  // Re-attach event listeners
  listEl.querySelectorAll('.page-item').forEach(el => {
    el.addEventListener('click', () => {
      openPage(el.dataset.key);
      // On mobile, close sidebar
      if (window.innerWidth <= 680) toggleMobileMenu(false);
    });
  });
  
  // Highlight selected
  if (state.currentKey) {
    const sel = listEl.querySelector(`[data-key="${CSS.escape(state.currentKey)}"]`);
    if (sel) sel.classList.add('selected');
  }
}

function pageItemHtml(p) {
  const dotClass = `dot-${p.lineage}`;
  return `<div class="page-item${p.key === state.currentKey ? ' selected' : ''}" data-key="${p.key}">
    <span class="dot ${dotClass}"></span>
    <span class="page-item-name">${p.name}</span>
  </div>`;
}

function renderCatTabs() {
  const tabs = document.getElementById('catTabs');
  const cats = ['All', ...CATEGORIES];
  tabs.innerHTML = cats.map(c => `<div class="cat-tab${state.category === c ? ' on' : ''}" onclick="setCategory('${c}')">${c}</div>`).join('');
}

// ─── DETAIL VIEW ─────────────────────────────────────────────────────────────
function openPage(key) {
  const page = VAULT[key];
  if (!page) return;
  
  state.currentKey = key;
  
  // Update list selection
  document.querySelectorAll('.page-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.key === key);
  });
  
  // Lineage badge
  const linLabels = {osr:'OSR & Neo-Trad', mainstream:'Mainstream / D&D', storygames:'Story Games & Indie', crossover:'Crossover'};
  const linLabel = linLabels[page.lineage] || page.lineage;
  
  // Connections
  const links = (page.links || []).filter(l => VAULT[resolveLink(l)]);
  const backlinks = [...(state.backlinks[key] || [])];
  
  let linksHtml = '';
  if (links.length) {
    const chips = links.map(l => {
      const rk = resolveLink(l);
      const name = rk ? VAULT[rk].name : l.split('/').pop();
      return `<a class="link-chip" href="#" onclick="openPage('${rk || l}');return false">${name}</a>`;
    }).join('');
    linksHtml += `<div class="detail-links"><h3>Links to</h3><div class="link-chips">${chips}</div></div>`;
  }
  
  // Clean up HTML content — remove wikilink handler from page, we do it via event delegation
  let bodyHtml = page.html || `<p>${page.summary}</p>`;
  
  // Backlinks section
  let backlinksHtml = '';
  if (backlinks.length) {
    const chips = backlinks.map(bk => {
      const bp = VAULT[bk];
      return `<a class="link-chip" href="#" onclick="openPage('${bk}');return false">${bp ? bp.name : bk}</a>`;
    }).join('');
    backlinksHtml = `<div class="backlinks-section"><h3>Linked from</h3><div class="link-chips">${chips}</div></div>`;
  }
  
  const html = `
    <div class="detail-header">
      <div class="detail-breadcrumb">${page.category}</div>
      <div class="detail-title">${page.name}</div>
      <div class="detail-badges">
        <span class="badge badge-${page.lineage}">${linLabel}</span>
        <span class="badge badge-cat">${page.category}</span>
      </div>
    </div>
    ${linksHtml}
    <div class="md-body">${bodyHtml}</div>
    ${backlinksHtml}
  `;
  
  document.getElementById('detailEmpty').style.display = 'none';
  const dc = document.getElementById('detailContent');
  dc.style.display = 'block';
  dc.innerHTML = html;
  dc.scrollTop = 0;
  
  // Wikilink clicks
  dc.querySelectorAll('a.wikilink').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const rawKey = a.dataset.key;
      const resolved = resolveLink(rawKey);
      if (resolved) openPage(resolved);
    });
  });
  
  // Scroll detail panel to top
  document.getElementById('detailPanel').scrollTop = 0;
}

// ─── FILTERS ────────────────────────────────────────────────────────────────
function toggleLineage(lin) {
  const btn = document.querySelector(`.flt.f-${lin}`);
  if (state.lineages.has(lin)) {
    state.lineages.delete(lin);
    btn.classList.remove('on');
  } else {
    state.lineages.add(lin);
    btn.classList.add('on');
  }
  renderList();
}

function setCategory(cat) {
  state.category = cat;
  renderCatTabs();
  renderList();
}

function onSearch(q) {
  state.search = q;
  renderList();
}

// ─── MOBILE ──────────────────────────────────────────────────────────────────
function toggleMobileMenu(force) {
  const sidebar = document.getElementById('sidebarList');
  const isOpen = sidebar.classList.contains('mobile-open');
  const shouldOpen = force !== undefined ? force : !isOpen;
  sidebar.classList.toggle('mobile-open', shouldOpen);
  document.getElementById('mobileMenuBtn').textContent = shouldOpen ? '✕ Close' : '☰ Browse';
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderCatTabs();
renderList();

// Handle URL hash for deep linking
if (location.hash) {
  const key = decodeURIComponent(location.hash.slice(1));
  if (VAULT[key]) {
    openPage(key);
    // Scroll to matching item in list
    const item = document.querySelector(`[data-key="${CSS.escape(key)}"]`);
    if (item) item.scrollIntoView({ block: 'center' });
  }
}
</script>

</body>
</html>
